excluded_apps = [
    "net.kovidgoyal.kitty",
    "com.apple.Terminal",
    "com.googlecode.iterm2",
    "com.jetbrains.intellij",
    "com.jetbrains.goland",
    "com.jetbrains.pycharm",
    "com.jetbrains.rider",
    "com.jetbrains.WebStorm",
    "com.jetbrains.datagrip",
    "com.jetbrains.clion",
    "com.jetbrains.rustrover",
    "com.microsoft.VSCode",
    "com.todesktop.230313mzl4w4u92",
]

[[key_rules]]
from_mods = ["ctrl"]
from_key = "c"
to_mods = ["cmd"]
to_key = "c"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "v"
to_mods = ["cmd"]
to_key = "v"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "x"
to_mods = ["cmd"]
to_key = "x"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "a"
to_mods = ["cmd"]
to_key = "a"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "z"
to_mods = ["cmd"]
to_key = "z"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "s"
to_mods = ["cmd"]
to_key = "s"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "p"
to_mods = ["cmd"]
to_key = "p"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "f"
to_mods = ["cmd"]
to_key = "f"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "t"
to_mods = ["cmd"]
to_key = "t"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "w"
to_mods = ["cmd"]
to_key = "w"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "n"
to_mods = ["cmd"]
to_key = "n"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "d"
to_mods = ["cmd"]
to_key = "d"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "r"
to_mods = ["cmd"]
to_key = "r"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "return"
to_mods = ["cmd"]
to_key = "return"

# Redo: Ctrl+Y -> Cmd+Shift+Z
[[key_rules]]
from_mods = ["ctrl"]
from_key = "y"
to_mods = ["cmd", "shift"]
to_key = "z"

# Word navigation: Ctrl+arrow -> Alt+arrow
[[key_rules]]
from_mods = ["ctrl"]
from_key = "left"
to_mods = ["alt"]
to_key = "left"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "right"
to_mods = ["alt"]
to_key = "right"

# Word delete: Ctrl+Delete/Backspace -> Alt+Delete/Backspace
[[key_rules]]
from_mods = ["ctrl"]
from_key = "forwarddelete"
to_mods = ["alt"]
to_key = "forwarddelete"

[[key_rules]]
from_mods = ["ctrl"]
from_key = "delete"
to_mods = ["alt"]
to_key = "delete"

# Shift combos
[[key_rules]]
from_mods = ["ctrl", "shift"]
from_key = "r"
to_mods = ["cmd", "shift"]
to_key = "r"

[[key_rules]]
from_mods = ["ctrl", "shift"]
from_key = "t"
to_mods = ["cmd", "shift"]
to_key = "t"

[[key_rules]]
from_mods = ["ctrl", "shift"]
from_key = "e"
to_mods = ["cmd", "alt"]
to_key = "e"

[[key_rules]]
from_mods = ["ctrl", "shift"]
from_key = "c"
to_mods = ["cmd", "alt"]
to_key = "c"

[[key_rules]]
from_mods = ["ctrl", "shift"]
from_key = "k"
to_mods = ["cmd", "alt"]
to_key = "k"

[[key_rules]]
from_mods = ["ctrl", "shift"]
from_key = "b"
to_mods = ["cmd", "shift"]
to_key = "b"

[[mouse_rules]]
from_mods = ["ctrl"]
button = "left"
to_mods = ["cmd"]

[[scroll_rules]]
from_mods = ["ctrl"]
to_mods = ["cmd"]
